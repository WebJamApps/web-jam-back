version: 2.1
jobs:
  build:
    docker:
      - image: cimg/node:24.15-browsers
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Test install
          command: npm install
      - run:
          name: typecheck
          command: npm run typecheck
      - run:
          name: run all tests
          command: npm test
      - store_artifacts:
          path: coverage
      - run:
          name: Smoketest - clean install without devDependencies
          command: |
            rm -rf node_modules package-lock.json JaMmusic build
            npm install --omit=dev
      - run:
          name: Smoketest - verify production build artifact exists
          command: test -f build/src/index.js
      - run:
          name: Smoketest - verify production server serves JaMmusic homepage
          command: |
            PORT=7777 NODE_OPTIONS=--unhandled-rejections=warn node build/src/index.js &
            SERVER_PID=$!
            sleep 5
            curl --fail --silent --show-error http://localhost:7777/ | grep -q '<title>Web Jam LLC</title>'
            STATUS=$?
            kill $SERVER_PID || true
            exit $STATUS
